<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Deep Luxury Red Radial Background (Creates a 3D dome effect) -->
    <radialGradient id="luxRed" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#FF4B4B" />
      <stop offset="50%" stop-color="#D81B1B" />
      <stop offset="100%" stop-color="#6B0000" />
    </radialGradient>

    <!-- Metallic Gold Rim Gradient -->
    <linearGradient id="goldRim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF2A8" />
      <stop offset="25%" stop-color="#D4AF37" />
      <stop offset="50%" stop-color="#AA7C11" />
      <stop offset="75%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#FFF2A8" />
    </linearGradient>

    <!-- Subtle Shine Overlay -->
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.5" />
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Complete Circle Base -->
  <circle cx="256" cy="256" r="250" fill="url(#luxRed)" />
  
  <!-- Outer Gold Rim, 3D Embossed look -->
  <circle cx="256" cy="256" r="238" fill="none" stroke="url(#goldRim)" stroke-width="24" />
  
  <!-- Inner delicate ring to add detail -->
  <circle cx="256" cy="256" r="215" fill="none" stroke="url(#goldRim)" stroke-width="4" opacity="0.6" />

  <!-- Glassy Shine Overlay on the dome -->
  <ellipse cx="256" cy="150" rx="180" ry="80" fill="url(#shine)" />

  <!-- The "38" Text -->
  <text 
    x="50%" y="54%" 
    text-anchor="middle" 
    dominant-baseline="middle" 
    font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" 
    font-weight="900" 
    font-size="290" 
    fill="#FFCC00" 
    filter="drop-shadow(0px 4px 6px rgba(0,0,0,0.8))">
    38
  </text>
</svg>