  <script>
    // One-time Quick Refresh Logic
    (function() {
      if (!sessionStorage.getItem('gregs_pizza_refreshed')) {
        sessionStorage.setItem('gregs_pizza_refreshed', 'true');
        window.location.reload();
      }
    })();

    // Site-wide Zoom Prevention (Browser Desktop & Mobile)
    document.addEventListener('wheel', function(event) {
      if (event.ctrlKey) {
        event.preventDefault();
      }
    }, { passive: false });

    // Aggressive Touch/Pinch Prevention (iOS/Android)
    document.addEventListener('touchstart', function(event) {
      if (event.touches.length > 1) {
        event.preventDefault();
      }
    }, { passive: false });

    document.addEventListener('touchmove', function(event) {
      if (event.touches.length > 1) {
        event.preventDefault();
      }
    }, { passive: false });

    document.addEventListener('keydown', function(event) {
      if ((event.ctrlKey || event.metaKey) && (event.key === '+' || event.key === '=' || event.key === '-' || event.key === '_' || event.key === '0')) {
        event.preventDefault();
      }
    });

    document.addEventListener('gesturestart', function(e) {
      e.preventDefault();
    });

    // Reset to Top and Scale 1 on Refresh
    if (history.scrollRestoration) {
      history.scrollRestoration = 'manual';
    }
    window.addEventListener('beforeunload', function() {
      window.scrollTo(0, 0);
    });
    window.scrollTo(0, 0);
  </script>
